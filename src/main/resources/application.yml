server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true

app:
  base-url: ${APP_BASE_URL}
  expiry-days: 30
  max-code-retries: 10

management:
  endpoints:
    web:
      base-path: /actuator
  endpoint:
    health:
      show-details: always

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mtidb}
    username: ${DATABASE_USERNAME:mti}
    password: ${DATABASE_PASSWORD:mti}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  rate-limit:
    requests-per-minute: 100

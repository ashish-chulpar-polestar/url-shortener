server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mtidb}
    username: ${DATABASE_USERNAME:mti}
    password: ${DATABASE_PASSWORD:mti}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

management:
  endpoints:
    web:
      exposure:
        include: health

logging:
  level:
    com.example.mti: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html

version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: mtidb
      POSTGRES_USER: mti
      POSTGRES_PASSWORD: mti
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mti -d mtidb"]
      interval: 5s
      timeout: 5s
      retries: 5

  mti-api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/mtidb
      DATABASE_USERNAME: mti
      DATABASE_PASSWORD: mti
    ports:
      - "8080:8080"

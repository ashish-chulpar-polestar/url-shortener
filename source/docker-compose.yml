version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mtidb
      POSTGRES_USER: mti
      POSTGRES_PASSWORD: mti
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/mtidb
      DATABASE_USERNAME: mti
      DATABASE_PASSWORD: mti
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:

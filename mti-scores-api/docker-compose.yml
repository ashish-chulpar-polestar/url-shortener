version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: mti
      POSTGRES_USER: mti
      POSTGRES_PASSWORD: mti
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/mti
      DATABASE_USERNAME: mti
      DATABASE_PASSWORD: mti
    ports:
      - "8080:8080"

volumes:
  postgres_data:

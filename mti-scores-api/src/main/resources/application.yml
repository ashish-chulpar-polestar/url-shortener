spring:
  application:
    name: mti-scores-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/mti}
    username: ${DATABASE_USERNAME:mti}
    password: ${DATABASE_PASSWORD:mti}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  rate-limit:
    capacity: 100
    refill-tokens: 100
    refill-period-seconds: 60

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{ISO8601} [%X{requestId}] %-5level %logger{36} - %msg%n"
